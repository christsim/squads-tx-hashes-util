name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Generate version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="build-${COMMIT_COUNT}-${SHORT_SHA}"
          NPM_VERSION="0.0.${COMMIT_COUNT}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "NPM_VERSION=${NPM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Generated version: ${VERSION}"
          echo "NPM version: ${NPM_VERSION}"
          echo "Node version: $(node -v)"
          echo "npm version: $(npm -v)"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: npm run build:all

      - name: Set npm package version
        run: |
          cd dist
          node -e "
            const p = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            p.version = '${{ steps.version.outputs.NPM_VERSION }}';
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2));
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          files: |
            dist/squads-tx-hashes.html
            dist/squads-tx-hashes.html.sha256
            dist/squads-decoder.js

      - name: Prepare GitHub Pages
        run: cp dist/squads-tx-hashes.html dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist

      - name: Publish to npm
        working-directory: dist
        run: npm publish --access public
